# Classification module training configuration
# This file drives ClassificationPipeline and is validated
# against ClassificationConfig (Pydantic schema).
# All unspecified keys fall back to TrainConfig defaults.

# ── Experiment Identity ────────────────────────────────────────────────────────
experiment_name: "classification-ag-news"
project_name: "modern-nlp-classification"
seed: 42

# ── Dataset ───────────────────────────────────────────────────────────────────
dataset_name: "ag_news"

# ── Model ─────────────────────────────────────────────────────────────────────
# Loaded via model.yaml: model_name, num_labels, max_seq_length

# ── Training ──────────────────────────────────────────────────────────────────
epochs: 3
batch_size: 32
learning_rate: 2.0e-5
weight_decay: 0.01
warmup_ratio: 0.1
scheduler_type: "linear"
gradient_accumulation_steps: 1
max_grad_norm: 1.0

# ── Loss ──────────────────────────────────────────────────────────────────────
label_smoothing: 0.0
use_class_weights: true
num_labels: 4

# ── Mixed Precision ───────────────────────────────────────────────────────────
fp16: true
bf16: false

# ── Evaluation ────────────────────────────────────────────────────────────────
evaluation_strategy: "steps"
eval_steps: 500
metric_for_best_model: "accuracy"
greater_is_better: true
early_stopping_patience: 3

# ── Checkpointing ─────────────────────────────────────────────────────────────
save_strategy: "steps"
save_steps: 500
output_dir: "checkpoints/classification"

# ── Logging ───────────────────────────────────────────────────────────────────
logging_dir: "logs/classification"
logging_steps: 50
report_to: ["tensorboard"]
use_wandb: false
